<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Password Reset Successful</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="signIn d-flex vh-100 w-100">
    <div class="image-section d-flex flex-column align-items-center w-50">
        <div class="logo">
            <img src="assets/images/Logo.png" alt="Logo" />
        </div>
        <div class = "vh-100">
            <img src="assets/images/man.png" alt="Sign In Image" class="" />
        </div>
    </div>
    <div class = "d-flex align-items-center w-50 ps-5">
    <div class="card signIn-card border-0">
        <div class="card-body d-flex flex-column gap-4">
            <h1 class="card-title mb-4">Password Reset Successful</h1>
            <p>Your password has been successfully reset</p>
            <form class = "d-flex flex-column" action="">
               <div class = "d-flex justify-content-center align-items-center">
                    <div class = "success-icon">
                    <i class="fa-solid fa-circle-check"></i>
                 </div> 
               </div>
                
                <button type="submit" class="btn btn-primary btn-block">Confirm</button>
            </form>
        </div>
  </div>
    </div>
   

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</body> 
</html>
